# Notemill: Worker configuration
#
# Fields with value CHANGE_ME must be filled in by the operator manually.
# Fields with value null are optional; leave as-is if not needed.
#
# CLI flags override the YAML values shown below. Repeated `--set key=value`
# also overrides any scalar by dotted path, e.g. `--set model.name=whisper-large`.

# --- Model ---------------------------------------------------------------
#
# Used by `notemill-worker run file` and `notemill-worker run queue`.
# The dedicated `notemill-worker models list|pull|add` subcommand manages files
# in `model.dir`.
model:
  # Model name from the catalog (`notemill-worker models list`) OR an absolute path
  # to a model file/directory. For a path, set `family` explicitly.
  # CLI override: --model-name
  name: whisper-medium

  # Required only when `name` is a path. Accepted: whisper | parakeet | giga-am.
  # CLI override: --model-family
  family: whisper

  # Directory with model files. Default: ./models.
  # CLI override: --model-dir
  dir: ./models

# --- Input (queue mode only) ---------------------------------------------
#
# Queue + bucket backends. Currently only the local pair (sqlite + fs) ships;
# a remote backend may be added later without changing this shape.
input:
  # Selects which per-driver block below is used. Reserved for future drivers
  # (http, watch_dir, ...). Today only "queue".
  driver: queue

  queue:
    backend: sqlite
    sqlite:
      path: /data/queue.db

    # How long a popped message stays invisible before redelivery.
    visibility_timeout_sec: 300
    # After this many redeliveries the message is moved to the DLQ table.
    max_receive: 5

    # Model lifecycle: lazy load on first job, unload after idle period.
    model:
      # Queue poll interval while the model is in memory.
      loaded_loop_ms: 1000
      # Queue poll interval after the model has been unloaded.
      unloaded_loop_ms: 60000
      # Unload the model after this many ms without work.
      unload_after_ms: 300000

    # Where the actual audio bytes live (claim-check pattern: queue carries
    # metadata + reference, bucket holds the payload). Queue-driver-specific.
    bucket:
      backend: fs
      fs:
        # Directory shared with the bot container via a docker volume.
        root: /data/buckets

# --- Output sinks --------------------------------------------------------
#
# `sink` selects which per-sink config block is actually used (couchdb / file /
# stdout). Per-sink blocks (e.g. `couchdb:` below) hold connection details and
# are read only when `sink` matches.
#
# Secrets (passwords) are kept OUTSIDE this file. Two sources are supported,
# in priority order (the first non-empty one wins):
#   1. File at the path given by `password_file` (recommended for docker secrets)
#   2. Environment variable named by `password_env` (recommended for compose with .env)
#
# Diagnose connectivity / schema with `notemill-worker couchdb probe`.
output:
  # Active sink. Accepted: stdout | file | couchdb. CLI override: --output
  sink: file

  # How to derive the note file name. Applies only to sinks that create one
  # file per note (currently: couchdb). Has no effect for file or stdout.
  # type: message_id  -- tg-{chat_id}-{message_id}  (default, no extra config)
  # type: datetime    -- format received_at with a chrono strftime string;
  #                      on collision appends -1, -2, ... before the extension.
  #                      Use only file-name-safe characters (e.g. %H-%M-%S not %H:%M:%S).
  name:
    type: datetime
    format: %Y-%m-%dT%H-%M-%SZ

  # Active when sink: stdout. Unused otherwise.
  stdout:
    # Marker between consecutive writes; written as `\n<separator>\n`.
    # Default "---". Set to null to disable.
    separator: "---"

  # Active when sink: file. Unused otherwise.
  file:
    # Filesystem path of the output file. CLI override: --target
    path: /data/transcripts.md
    # Truncate on open instead of appending. CLI `--overwrite` forces true.
    overwrite: false
    # Marker between consecutive writes; written as `\n<separator>\n`.
    # Default "---" (markdown horizontal rule). Set to null to disable.
    separator: "---"

  # Active when sink: couchdb. Unused otherwise.
  couchdb:
    # Example: http://nas.local:5984
    url: CHANGE_ME

    # Synced from Obsidian via obsidian-livesync.
    database: CHANGE_ME

    username: CHANGE_ME

    password_env: COUCHDB_PASSWORD
    password_file: /run/secrets/couchdb_password

    # Doc-path prefix; each queue job writes to `<target>/<safe dedup_key>.md`.
    # CLI override: --target
    target: Inbox

# --- Audio ---------------------------------------------------------------
#
# Decoder (ffmpeg) settings and preprocessing steps that run between
# decode and transcription:
#   * ffmpeg: global libav* options (log verbosity).
#   * preprocess.vad: silero-based voice activity detection. Trims non-
#     speech regions before they reach the encoder, which both reduces
#     memory pressure on long files and suppresses hallucinations on
#     silence.
#   * preprocess.chunking: cap on the audio length fed to the encoder
#     in one pass.
#
# When running on a host with plenty of RAM and short clips, set
# `vad.enabled: false` to skip the step entirely.
audio:
  # Global FFmpeg library settings, applied once at startup.
  #
  # `log_level` controls how chatty FFmpeg is on stderr:
  #   quiet   - no FFmpeg messages at all
  #   error   - only errors (default; silences harmless ogg/opus warnings
  #             that Telegram voice notes commonly trigger)
  #   warning - errors + warnings
  #   info    - everything FFmpeg normally emits
  #   verbose / debug / trace - increasingly noisy
  ffmpeg:
    log_level: error

  preprocess:
    vad:
      # Run silero VAD before transcription. Default: true.
      enabled: true
      # Speech probability cutoff (0.0..1.0). Higher = stricter (more is
      # treated as silence). 0.5 is the silero-recommended default.
      threshold: 0.5
      # Speech runs shorter than this are dropped (filters blips). ms.
      min_speech_ms: 250
      # Silence shorter than this between speech runs is preserved (runs are merged).
      # Larger values stitch broken phrases back together. ms.
      min_silence_ms: 500
      # Pad each detected segment with this much audio on both sides to
      # avoid clipping consonants at boundaries. ms.
      speech_pad_ms: 100
      # Path to silero_vad.onnx. If unset, falls back to $SILERO_VAD_MODEL,
      # then to /opt/silero/silero_vad.onnx (the location used inside the Docker image).
      model_path: null

    # Chunking caps the length of audio fed to the encoder in one pass.
    # Self-attention memory grows quadratically with sequence length, so
    # on low-RAM hosts (e.g. NAS) keeping chunks small is what prevents
    # std::bad_alloc on long recordings. On a beefy host set
    # `enabled: false` and let the encoder see the full speech stream.
    chunking:
      enabled: true
      # Soft cap per chunk in seconds. Adjacent VAD segments are grouped
      # under this; a segment longer than this is sliced with overlap.
      max_seconds: 20.0
      # Used only when one VAD segment exceeds max_seconds.
      # Consecutive slices repeat this much audio so a word straddling
      # the boundary is decoded twice; the dupes are deduped on transcript join.
      overlap_seconds: 0.5
